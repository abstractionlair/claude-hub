# Multi-Model Review System — Model Configuration
#
# Each model entry specifies how to invoke it as an agent or text processor.
# mode: agentic — model reads files itself via codebase access
# mode: bundled — content written to temp file, passed alongside prompt
#
# Placeholders in invoke arrays:
#   {prompt}      — the constructed review prompt (inline, for agentic models)
#   {prompt_file} — path to temp file containing the prompt
#   {file}        — path to temp file containing bundled content (bundled mode only)
#
# stdin_prompt: true — pipe prompt content via subprocess stdin instead of
#   command-line args.  Avoids ARG_MAX limits for large prompts.  The engine
#   reads {prompt_file} and passes its content as subprocess input=.

models:
  claude:
    display_name: "Claude (Anthropic)"
    mode: agentic
    invoke: ["claude", "--model", "opus", "--effort", "high", "--output-format", "json", "-p", "Follow the review instructions provided via stdin."]
    stdin_prompt: true
    cost_tier: subscription
    max_input_chars: 400000
    timeout_seconds: 600
    clean_room_flags: []  # --profile not yet available in Claude CLI
    session_id_format: claude
    resume_cmd: ["claude", "--session-id", "{session_id}", "--output-format", "json", "-p", "-"]
    grading_cmd: ["claude", "--model", "opus", "--output-format", "json", "--allowedTools", "", "-p", "-"]

  claude-sonnet-4.6:
    display_name: "Claude Sonnet 4.6 (Anthropic)"
    mode: agentic
    invoke: ["claude", "--model", "sonnet", "--effort", "high", "--output-format", "json", "-p", "Follow the review instructions provided via stdin."]
    stdin_prompt: true
    cost_tier: subscription
    max_input_chars: 400000
    timeout_seconds: 600
    clean_room_flags: []
    session_id_format: claude
    resume_cmd: ["claude", "--session-id", "{session_id}", "--output-format", "json", "-p", "-"]
    grading_cmd: ["claude", "--model", "opus", "--output-format", "json", "--allowedTools", "", "-p", "-"]

  # Gemini seats run via Antigravity's `agy` CLI (Google retired the standalone
  # gemini CLI). CRITICAL: --model takes DISPLAY-NAME form ("Gemini 3.1 Pro (High)");
  # slug forms (gemini-3.1-pro) are SILENTLY ignored and serve Flash. Verified
  # 2026-07-09 with an identity probe (work-graph chmm-6). Default --print-timeout
  # is 5m, which kills real agentic reviews — set explicitly. No session-id capture
  # yet (agy output is plain text), so peer follow-up marks agy seats unresolved.
  gemini-3.1-pro:
    display_name: "Gemini 3.1 Pro (Google, via Antigravity)"
    mode: agentic
    invoke: ["agy", "-p", "Follow the review instructions provided via stdin.", "--model", "Gemini 3.1 Pro (High)", "--add-dir", "/tmp", "--sandbox", "--dangerously-skip-permissions", "--print-timeout", "40m"]
    stdin_prompt: true
    cost_tier: subscription
    max_input_chars: 2000000
    timeout_seconds: 2700
    clean_room_flags: []
    grading_cmd: ["agy", "-p", "Follow the grading instructions provided via stdin.", "--model", "Gemini 3.1 Pro (High)", "--print-timeout", "15m"]

  # Flash seat upgraded: agy serves 3.5 Flash; the 3-series flash is gone.
  gemini-3.5-flash:
    display_name: "Gemini 3.5 Flash (Google, via Antigravity)"
    mode: agentic
    invoke: ["agy", "-p", "Follow the review instructions provided via stdin.", "--model", "Gemini 3.5 Flash (High)", "--add-dir", "/tmp", "--sandbox", "--dangerously-skip-permissions", "--print-timeout", "30m"]
    stdin_prompt: true
    cost_tier: subscription
    max_input_chars: 1000000
    timeout_seconds: 2000
    clean_room_flags: []
    grading_cmd: ["agy", "-p", "Follow the grading instructions provided via stdin.", "--model", "Gemini 3.5 Flash (High)", "--print-timeout", "15m"]

  gpt-5.4:
    display_name: "GPT-5.4 (via Codex)"
    mode: agentic
    invoke: ["codex", "exec", "-m", "gpt-5.4", "--sandbox", "read-only", "--skip-git-repo-check", "--json", "-"]
    stdin_prompt: true
    cost_tier: subscription
    max_input_chars: 256000
    timeout_seconds: 900
    clean_room_flags: []
    session_id_format: codex
    resume_cmd: ["codex", "exec", "resume", "--json", "{session_id}", "-"]
    grading_cmd: ["codex", "exec", "-m", "gpt-5.4", "--sandbox", "read-only", "--skip-git-repo-check", "--ephemeral", "--json", "-"]

  # --- Audition queue (paused until the opencode spending cap resets, ~2026-08) ---
  # Candidates with positive ad-hoc evidence, to be seated and GRADED before keeping:
  #   glm-5.2        (opencode) — "impressive for its cost" in July side work
  #   grok-4.5       (opencode, xAI provider, --agent plan) — debut review graded
  #                  EXCELLENT in job b030a8bb (2026-07-09 panel)
  #   deepseek-v4-*  — clean fast delegation-pilot execution 2026-07-05; no review grade yet
  #   minimax (latest) — no recent evidence found; mine review_grades before seating
  # Work-graph node tracks this. GPT models: NEVER via opencode — codex only (cost).

  # --- Dropped models (2026-03-31) ---
  # Review grades showed 0-67% pass rates with false negatives and HARMFUL grades.
  # Kept in config for reference but disabled.
  #
  # kimi-k2.5, gpt-5.3-codex, glm-5, minimax-m2.7, grok-code-fast-1, mimo-v2-pro

synthesis:
  model: claude
  timeout_seconds: 120
