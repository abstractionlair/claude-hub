<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claude Hub</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #060a14;
            --bg: #0a0e1a;
            --surface: #111827;
            --surface-raised: #1a2235;
            --border: #1e293b;
            --border-lit: #2a3a52;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --text-faint: #475569;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.15);
            --cyan: #22d3ee;
            --cyan-dim: rgba(34, 211, 238, 0.12);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.12);
            --amber: #fbbf24;
            --red: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        /* Subtle dot grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, var(--border) 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient gradient orb */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Top bar ─── */
        .topbar {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-mark {
            width: 28px;
            height: 28px;
            position: relative;
        }

        .brand-mark::before,
        .brand-mark::after {
            content: '';
            position: absolute;
            border-radius: 50%;
        }

        .brand-mark::before {
            inset: 0;
            border: 1.5px solid var(--accent);
            opacity: 0.6;
        }

        .brand-mark::after {
            inset: 8px;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
            animation: corePulse 3s ease-in-out infinite;
        }

        @keyframes corePulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .brand-name {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text);
        }

        .brand-name span {
            color: var(--text-dim);
            font-weight: 300;
        }

        .sys-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
        }

        .sys-status .pulse {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: all 0.5s ease;
        }

        .sys-status .pulse.ok {
            background: var(--green);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
        }

        .sys-status .pulse.err {
            background: var(--red);
            box-shadow: 0 0 8px rgba(248, 113, 113, 0.5);
        }

        /* ─── Main content ─── */
        .main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px 20px 72px;
            gap: 16px;
            overflow-y: auto;
        }

        /* ─── Control panels ─── */
        .panels {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            flex: 1;
            min-height: 0;
        }

        .panel {
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px 20px 20px;
            text-decoration: none;
            color: var(--text);
            overflow: hidden;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            transition: border-color 0.25s ease, transform 0.15s ease;
            animation: panelIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .panel:nth-child(1) { animation-delay: 0.05s; }
        .panel:nth-child(2) { animation-delay: 0.12s; }
        .panel:nth-child(3) { animation-delay: 0.19s; }
        .panel:nth-child(4) { animation-delay: 0.26s; }
        .panel:nth-child(5) { animation-delay: 0.33s; }
        .panel:nth-child(6) { animation-delay: 0.40s; }
        .panel:nth-child(7) { animation-delay: 0.47s; }

        @keyframes panelIn {
            from { opacity: 0; transform: translateY(16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top edge indicator light */
        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 2px;
            border-radius: 0 0 2px 2px;
            background: var(--border-lit);
            transition: all 0.4s ease;
        }

        .panel[data-status="ok"]::before {
            background: var(--cyan);
            box-shadow: 0 0 12px var(--cyan-dim), 0 2px 20px var(--cyan-dim);
        }

        .panel:hover {
            border-color: var(--border-lit);
            transform: translateY(-2px);
        }

        .panel:active {
            transform: scale(0.98);
            border-color: var(--accent);
        }

        /* Panel internals */
        .panel-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .panel-icon svg {
            width: 22px;
            height: 22px;
        }

        .panel-icon.chat {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.12), rgba(233, 69, 96, 0.04));
            color: var(--accent);
        }

        .panel-icon.term {
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.12), rgba(34, 211, 238, 0.04));
            color: var(--cyan);
        }

        .panel-icon.notif {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.12), rgba(251, 191, 36, 0.04));
            color: var(--amber);
        }

        .panel-icon.docs {
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.12), rgba(52, 211, 153, 0.04));
            color: var(--green);
        }

        .panel-icon.group {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.12), rgba(168, 85, 247, 0.04));
            color: #a855f7;
        }

        .panel-icon.research {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(59, 130, 246, 0.04));
            color: #3b82f6;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
            margin-bottom: 4px;
        }

        .panel-desc {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
            flex: 1;
        }

        .panel-meta {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-faint);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-meta .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-faint);
            flex-shrink: 0;
        }

        .panel-meta .dot.live {
            background: var(--green);
            box-shadow: 0 0 6px rgba(52, 211, 153, 0.4);
        }

        /* ─── Info strip ─── */
        .info-strip {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
            animation: panelIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s backwards;
        }

        .info-card {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-card .info-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-faint);
        }

        .info-card .info-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            transition: color 0.3s ease;
        }

        .info-card .info-value.ok { color: var(--green); }

        /* ─── Mobile layout ─── */
        @media (max-width: 640px) {
            .topbar { padding: 12px 16px; }

            .main {
                padding: 4px 14px 72px;
                gap: 10px;
            }

            .panels {
                grid-template-columns: 1fr;
                flex: none;
            }

            .panel {
                flex-direction: row;
                align-items: center;
                padding: 16px;
                gap: 14px;
                min-height: 0;
            }

            .panel-icon { margin-bottom: 0; }

            .panel-body { flex: 1; }

            .panel-desc { display: none; }

            .panel-meta {
                margin-top: 8px;
                padding-top: 0;
                border-top: none;
            }

            .info-strip { flex-direction: column; gap: 8px; }
        }

        /* ─── Tablet sweet spot (8-10") ─── */
        @media (min-width: 641px) and (max-width: 1024px) {
            .main { padding: 12px 24px 72px; }

            .panels { gap: 14px; }

            .panel { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">
            <div class="brand-mark"></div>
            <div class="brand-name">Claude <span>Hub</span></div>
        </div>
        <div class="sys-status">
            <div class="pulse" id="sysPulse"></div>
            <span id="sysLabel">checking</span>
        </div>
    </div>

    <div class="main">
        <div class="panels">
            <a href="/chat" class="panel" id="panelChat">
                <div class="panel-icon chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                </div>
                <div class="panel-body">
                    <div class="panel-title">Chat</div>
                    <div class="panel-desc">Talk to Main Claude directly</div>
                    <div class="panel-meta">
                        <div class="dot" id="chatDot"></div>
                        <span id="chatMeta">—</span>
                    </div>
                </div>
            </a>

            <a href="/terminal" class="panel" id="panelTerm">
                <div class="panel-icon term">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="4 17 10 11 4 5"/>
                        <line x1="12" y1="19" x2="20" y2="19"/>
                    </svg>
                </div>
                <div class="panel-body">
                    <div class="panel-title">Terminal</div>
                    <div class="panel-desc">Shell access via TOTP</div>
                    <div class="panel-meta">
                        <div class="dot" id="termDot"></div>
                        <span id="termMeta">—</span>
                    </div>
                </div>
            </a>

            <a href="/notifications/view" class="panel" id="panelNotif">
                <div class="panel-icon notif">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </div>
                <div class="panel-body">
                    <div class="panel-title">Alerts</div>
                    <div class="panel-desc">System notifications &amp; agent updates</div>
                    <div class="panel-meta">
                        <div class="dot" id="notifDot"></div>
                        <span id="notifMeta">—</span>
                    </div>
                </div>
            </a>

            <a href="/simple-publications" class="panel" id="panelDocs">
                <div class="panel-icon docs">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </div>
                <div class="panel-body">
                    <div class="panel-title">Docs</div>
                    <div class="panel-desc">Architecture &amp; service documentation</div>
                    <div class="panel-meta">
                        <div class="dot live"></div>
                        <span>simple-publications</span>
                    </div>
                </div>
            </a>

            <a href="/group" class="panel" id="panelGroup">
                <div class="panel-icon group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <div class="panel-body">
                    <div class="panel-title">Group Chat</div>
                    <div class="panel-desc">Multi-participant conversations</div>
                    <div class="panel-meta">
                        <div class="dot"></div>
                        <span>—</span>
                    </div>
                </div>
            </a>
        </div>

        <div class="info-strip">
            <div class="info-card">
                <div>
                    <div class="info-label">Server</div>
                    <div class="info-value" id="infoServer">—</div>
                </div>
            </div>
            <div class="info-card">
                <div>
                    <div class="info-label">Latency</div>
                    <div class="info-value" id="infoLatency">—</div>
                </div>
            </div>
            <div class="info-card">
                <div>
                    <div class="info-label">Uptime</div>
                    <div class="info-value" id="infoUptime">—</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var startTime = Date.now();

        async function checkHealth() {
            var pulse = document.getElementById('sysPulse');
            var label = document.getElementById('sysLabel');
            var server = document.getElementById('infoServer');
            var latency = document.getElementById('infoLatency');

            try {
                var t0 = performance.now();
                var resp = await fetch('/health', { signal: AbortSignal.timeout(5000) });
                var ms = Math.round(performance.now() - t0);

                if (resp.ok) {
                    pulse.className = 'pulse ok';
                    label.textContent = 'online';
                    server.textContent = 'healthy';
                    server.className = 'info-value ok';
                    latency.textContent = ms + 'ms';
                    latency.className = 'info-value' + (ms < 200 ? ' ok' : '');

                    // Light up panel indicators
                    document.getElementById('panelChat').setAttribute('data-status', 'ok');
                    document.getElementById('panelTerm').setAttribute('data-status', 'ok');
                    document.getElementById('panelNotif').setAttribute('data-status', 'ok');

                    document.getElementById('chatDot').className = 'dot live';
                    document.getElementById('chatMeta').textContent = 'connected';
                    document.getElementById('termDot').className = 'dot live';
                    document.getElementById('termMeta').textContent = 'available';
                } else {
                    pulse.className = 'pulse err';
                    label.textContent = 'error';
                    server.textContent = 'HTTP ' + resp.status;
                    server.className = 'info-value';
                }
            } catch (e) {
                pulse.className = 'pulse err';
                label.textContent = 'offline';
                server.textContent = 'unreachable';
                server.className = 'info-value';
            }
        }

        function updateUptime() {
            var sec = Math.floor((Date.now() - startTime) / 1000);
            var el = document.getElementById('infoUptime');
            if (sec < 60) {
                el.textContent = sec + 's';
            } else if (sec < 3600) {
                el.textContent = Math.floor(sec / 60) + 'm';
            } else {
                el.textContent = Math.floor(sec / 3600) + 'h ' + Math.floor((sec % 3600) / 60) + 'm';
            }
        }

        // Check notification count
        async function checkNotifications() {
            var dot = document.getElementById('notifDot');
            var meta = document.getElementById('notifMeta');
            try {
                var resp = await fetch('/notifications/api/list?unread_only=true&limit=1');
                if (resp.ok) {
                    var data = await resp.json();
                    var count = data.unread_count || 0;
                    if (count > 0) {
                        dot.className = 'dot live';
                        meta.textContent = count + ' unread';
                    } else {
                        meta.textContent = 'all clear';
                    }
                }
            } catch (e) {
                meta.textContent = 'check alerts';
            }
        }

        checkHealth();
        updateUptime();
        checkNotifications();
        setInterval(checkHealth, 30000);
        setInterval(updateUptime, 10000);

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').catch(function() {});
        }
    </script>
    <script src="/static/nav.js"></script>
    <script>if (typeof initNav === 'function') initNav('dashboard');</script>
</body>
</html>
