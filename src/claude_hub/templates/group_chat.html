<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Claude Hub — Group Chat</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Markdown rendering -->
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

    <style>
        :root {
            --bg-deep: #060a14;
            --bg: #0a0e1a;
            --surface: #111827;
            --surface-raised: #1a2235;
            --border: #1e293b;
            --border-lit: #2a3a52;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --text-faint: #475569;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.15);
            --cyan: #22d3ee;
            --cyan-dim: rgba(34, 211, 238, 0.12);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.12);
            --amber: #fbbf24;
            --red: #f87171;
            --input-bg: #0f1729;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        /* Dot grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, var(--border) 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient gradient orb */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top bar ── */
        .topbar {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-mark {
            width: 24px;
            height: 24px;
            position: relative;
            flex-shrink: 0;
        }

        .brand-mark::before,
        .brand-mark::after {
            content: '';
            position: absolute;
            border-radius: 50%;
        }

        .brand-mark::before {
            inset: 0;
            border: 1.5px solid var(--cyan);
            opacity: 0.6;
        }

        .brand-mark::after {
            inset: 6px;
            background: var(--cyan);
            box-shadow: 0 0 12px var(--cyan-dim);
            animation: corePulse 3s ease-in-out infinite;
        }

        @keyframes corePulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .topbar-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .topbar-title span {
            color: var(--text-dim);
            font-weight: 300;
        }

        .conversation-id {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-faint);
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px 8px;
            margin-left: 8px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-faint);
            transition: all 0.4s ease;
        }

        .status-dot.connected {
            background: var(--green);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
        }

        .status-dot.thinking {
            background: var(--amber);
            box-shadow: 0 0 8px rgba(251, 191, 36, 0.5);
            animation: statusPulse 1.5s infinite;
        }

        .status-dot.streaming {
            background: var(--cyan);
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.5);
            animation: statusPulse 1s infinite;
        }

        .status-dot.disconnected {
            background: var(--red);
            box-shadow: 0 0 8px rgba(248, 113, 113, 0.5);
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Main layout: messages + sidebar ── */
        .main-layout {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* ── Messages area ── */
        .messages-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border-lit);
            border-radius: 3px;
        }

        /* Message bubbles */
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }

        .message .sender-name {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .message.self {
            align-self: flex-end;
            background: var(--surface-raised);
            border: 1px solid var(--border-lit);
            border-bottom-right-radius: 4px;
        }

        .message.self .sender-name { display: none; }

        .message.other {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.system-msg {
            background: transparent;
            color: var(--text-dim);
            font-size: 12px;
            align-self: center;
            text-align: center;
            border: none;
            font-family: 'IBM Plex Mono', monospace;
            max-width: 100%;
            padding: 4px 0;
        }

        .message.system-msg .sender-name { display: none; }

        /* Markdown rendering in messages */
        .message-content { white-space: normal; }
        .message-content pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-family: 'IBM Plex Mono', monospace;
        }
        .message-content code {
            background: rgba(0,0,0,0.2);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9em;
        }
        .message-content pre code { background: none; padding: 0; }
        .message-content p { margin: 0.4em 0; }
        .message-content p:first-child { margin-top: 0; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content ul, .message-content ol { margin: 0.4em 0; padding-left: 1.5em; }
        .message-content h1, .message-content h2, .message-content h3 { margin: 0.5em 0 0.3em; }
        .message-content h1 { font-size: 1.2em; }
        .message-content h2 { font-size: 1.1em; }
        .message-content h3 { font-size: 1.05em; }
        .message-content table { border-collapse: collapse; margin: 0.4em 0; }
        .message-content th, .message-content td { border: 1px solid var(--border-lit); padding: 4px 8px; }
        .message-content blockquote { border-left: 3px solid var(--cyan); padding-left: 12px; margin: 0.4em 0; opacity: 0.85; }

        /* Copy button on messages */
        .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: var(--text-dim);
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            padding: 2px 6px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            width: auto;
            height: auto;
        }
        .message:hover .copy-btn,
        .copy-btn:focus { opacity: 1; }
        .copy-btn.copied { color: var(--green); }

        /* Streaming cursor */
        .streaming-cursor::after {
            content: '';
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--cyan);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: cursorBlink 0.8s infinite;
        }

        @keyframes cursorBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Thinking dots */
        .thinking {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .thinking span {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .thinking span:nth-child(1) { animation-delay: -0.32s; }
        .thinking span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
        }

        .participant-count {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text-faint);
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1px 8px;
        }

        .participant-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .participant-list::-webkit-scrollbar {
            width: 4px;
        }

        .participant-list::-webkit-scrollbar-thumb {
            background: var(--border-lit);
            border-radius: 2px;
        }

        .participant {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            transition: background 0.15s;
            cursor: pointer;
        }

        .participant:hover {
            background: var(--surface-raised);
        }

        .participant-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
            border: 1px solid transparent;
        }

        .participant-info {
            flex: 1;
            min-width: 0;
        }

        .participant-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .participant-type {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .participant-type.human { color: var(--green); }
        .participant-type.claude { color: var(--cyan); }

        .sidebar-actions {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        .add-claude-btn {
            width: 100%;
            background: var(--cyan-dim);
            color: var(--cyan);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 8px;
            padding: 8px 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            height: auto;
        }

        .add-claude-btn:hover {
            background: rgba(34, 211, 238, 0.18);
            border-color: rgba(34, 211, 238, 0.35);
        }

        .add-claude-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .add-claude-btn svg {
            width: 14px;
            height: 14px;
        }

        /* ── Input area ── */
        .input-area {
            position: relative;
            z-index: 2;
            background: var(--surface);
            padding: 12px 20px;
            padding-bottom: 72px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .mention-prefix {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--cyan);
            background: var(--cyan-dim);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 6px;
            padding: 4px 8px;
            cursor: pointer;
            flex-shrink: 0;
            align-self: center;
            transition: all 0.2s;
            height: auto;
            width: auto;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .mention-prefix:hover {
            background: rgba(34, 211, 238, 0.18);
        }

        .mention-prefix .mention-name {
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            resize: none;
            outline: none;
            min-height: 42px;
            max-height: 120px;
            line-height: 1.4;
        }

        textarea:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 2px var(--cyan-dim);
        }

        textarea::placeholder {
            color: var(--text-faint);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.1s;
        }

        .send-btn:hover { opacity: 0.9; }
        .send-btn:active { transform: scale(0.95); }

        .send-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ── Mention dropdown ── */
        .mention-dropdown {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            background: var(--surface-raised);
            border: 1px solid var(--border-lit);
            border-radius: 10px;
            margin-bottom: 6px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 10;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
        }

        .mention-dropdown.visible { display: block; }

        .mention-option {
            padding: 8px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            transition: background 0.1s;
        }

        .mention-option:first-child { border-radius: 10px 10px 0 0; }
        .mention-option:last-child { border-radius: 0 0 10px 10px; }

        .mention-option:hover, .mention-option.selected {
            background: rgba(34, 211, 238, 0.08);
        }

        .mention-option .mention-opt-name { flex: 1; }

        .mention-option .mention-opt-type {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--text-faint);
            text-transform: uppercase;
        }

        /* ── Sidebar toggle (mobile) ── */
        .sidebar-toggle {
            display: none;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            padding: 6px 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            cursor: pointer;
            align-items: center;
            gap: 4px;
            width: auto;
            height: auto;
        }

        .sidebar-toggle svg {
            width: 14px;
            height: 14px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(100%);
                transition: transform 0.3s ease;
                box-shadow: -4px 0 20px rgba(0,0,0,0.5);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-toggle {
                display: flex;
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 99;
            }

            .sidebar-overlay.visible {
                display: block;
            }

            .message { max-width: 90%; }
            .topbar { padding: 10px 14px; }
            .messages { padding: 12px 14px; }
            .input-area { padding: 10px 14px; padding-bottom: 72px; }
            .conversation-id { display: none; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="topbar">
        <div class="topbar-left">
            <div class="brand-mark"></div>
            <div class="topbar-title">Group <span>Chat</span></div>
            <span class="conversation-id" id="convIdBadge"></span>
        </div>
        <div class="topbar-right">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusLabel">connecting</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span id="toggleCount">0</span>
            </button>
        </div>
    </div>

    <div class="main-layout">
        <div class="messages-container">
            <div class="messages" id="messages"></div>

            <div class="input-area">
                <button class="mention-prefix" id="mentionBtn" title="Click to select recipient">
                    @<span class="mention-name" id="mentionName">all</span>
                </button>
                <div class="input-wrapper">
                    <div class="mention-dropdown" id="mentionDropdown"></div>
                    <textarea
                        id="input"
                        placeholder="Message the group..."
                        rows="1"
                        onkeydown="handleKeydown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                </div>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Participants</span>
                <span class="participant-count" id="participantCount">0</span>
            </div>
            <div class="participant-list" id="participantList"></div>
            <div class="sidebar-actions">
                <button class="add-claude-btn" id="addClaudeBtn" onclick="promptAddClaude('chat')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Add Claude
                </button>
                <button class="add-claude-btn" style="background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan);" onclick="promptAddClaude('main')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Add Main Claude
                </button>
                <button class="add-claude-btn" onclick="promptAddCli('codex')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Add Codex
                </button>
                <button class="add-claude-btn" onclick="promptAddCli('gemini')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Add Gemini
                </button>
            </div>
        </div>
    </div>

    <script>
        // ── State ──
        var ws = null;
        var reconnectAttempts = 0;
        var MAX_RECONNECT_ATTEMPTS = 10;
        var participants = {};       // id -> { id, name, type }
        var participantColors = {};  // id -> css color
        var streamBuffers = {};      // sender_id -> { div, text }
        var selectedRecipient = null; // null = broadcast to all
        var mentionDropdownIndex = -1;
        var pingInterval = null;
        var renderedMessageIds = new Set(); // Track rendered message IDs to avoid dupes on catch_up

        // Color palette for participant names
        var COLORS = [
            '#22d3ee', '#e94560', '#34d399', '#fbbf24', '#a78bfa',
            '#fb923c', '#f472b6', '#38bdf8', '#4ade80', '#facc15',
            '#c084fc', '#fb7185', '#2dd4bf', '#818cf8', '#f97316'
        ];
        var colorIndex = 0;

        function assignColor(id) {
            if (!participantColors[id]) {
                participantColors[id] = COLORS[colorIndex % COLORS.length];
                colorIndex++;
            }
            return participantColors[id];
        }

        // ── Conversation ID ──
        function getConversationId() {
            // From URL path: /group/{id} or /group?conversation_id={id}
            var pathMatch = window.location.pathname.match(/\/group\/([^\/]+)/);
            if (pathMatch) return pathMatch[1];

            var params = new URLSearchParams(window.location.search);
            var fromQuery = params.get('conversation_id') || params.get('id');
            if (fromQuery) return fromQuery;

            // Generate a random one
            return 'gc-' + Math.random().toString(36).substring(2, 10);
        }

        var conversationId = getConversationId();
        var userName = new URLSearchParams(window.location.search).get('name') || 'User';
        var myParticipantId = 'human-' + userName.toLowerCase().replace(/\s+/g, '-');

        // ── Status ──
        function setStatus(text, state) {
            var dot = document.getElementById('statusDot');
            var label = document.getElementById('statusLabel');
            dot.className = 'status-dot ' + state;
            label.textContent = text;
        }

        // ── Markdown (all HTML set via DOMPurify.sanitize) ──
        function renderMarkdown(text) {
            if (typeof marked !== 'undefined' && text) {
                var rendered = marked.parse(text);
                if (typeof DOMPurify !== 'undefined') {
                    return DOMPurify.sanitize(rendered);
                }
            }
            return null;
        }

        // Safe helper: sets sanitized markdown HTML on an element, or falls
        // back to textContent when the libraries have not loaded yet.
        function setSanitizedContent(el, rawText) {
            var safe = renderMarkdown(rawText);
            if (safe !== null) {
                el.innerHTML = safe;  // already sanitized by DOMPurify
            } else {
                el.textContent = rawText;
            }
        }

        // ── WebSocket ──
        function connectWebSocket() {
            var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var url = proto + '//' + location.host + '/ws/group/' + encodeURIComponent(conversationId) + '?name=' + encodeURIComponent(userName);

            ws = new WebSocket(url);

            ws.onopen = function() {
                reconnectAttempts = 0;
                setStatus('connected', 'connected');
                addSystemMessage('Connected to group chat');

                // Start ping interval
                if (pingInterval) clearInterval(pingInterval);
                pingInterval = setInterval(function() {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'ping' }));
                    }
                }, 30000);
            };

            ws.onmessage = function(event) {
                var data = JSON.parse(event.data);
                handleServerEvent(data);
            };

            ws.onclose = function() {
                setStatus('disconnected', 'disconnected');
                if (pingInterval) {
                    clearInterval(pingInterval);
                    pingInterval = null;
                }
                scheduleReconnect();
            };

            ws.onerror = function() {
                setStatus('error', 'disconnected');
            };
        }

        function scheduleReconnect() {
            if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                setStatus('connection lost', 'disconnected');
                addSystemMessage('Connection lost. Refresh the page to reconnect.');
                return;
            }
            reconnectAttempts++;
            var delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000);
            addSystemMessage('Reconnecting in ' + Math.round(delay / 1000) + 's...');
            setTimeout(connectWebSocket, delay);
        }

        function handleServerEvent(data) {
            switch (data.type) {
                case 'group_message':
                    handleGroupMessage(data);
                    break;

                case 'stream_chunk':
                    handleStreamChunk(data);
                    break;

                case 'stream_end':
                    handleStreamEnd(data);
                    break;

                case 'participant_joined':
                    handleParticipantJoined(data.participant);
                    break;

                case 'participant_left':
                    handleParticipantLeft(data.participant_id);
                    break;

                case 'catch_up':
                    handleCatchUp(data);
                    break;

                case 'keepalive':
                    break;

                case 'pong':
                    break;

                default:
                    console.log('Unknown event type:', data.type);
            }
        }

        // ── Message handlers ──

        function handleGroupMessage(data) {
            // Track by message ID to avoid duplicates on catch_up
            var msgId = data.id;
            if (msgId) {
                if (renderedMessageIds.has(msgId)) return;
                renderedMessageIds.add(msgId);
            }

            var sender = data.sender_name || data.sender || 'Unknown';
            var senderId = data.sender_id || '';
            var content = data.content || '';
            var msgType = data.message_type || 'chat';

            if (msgType === 'join' || msgType === 'leave' || msgType === 'system') {
                addSystemMessage(content);
                return;
            }

            var isSelf = (senderId === myParticipantId);
            var color = assignColor(senderId);
            var pType = participants[senderId] && participants[senderId].participant_type;
            var isClaude = pType === 'claude_proc' || pType === 'cli_chat';
            addGroupMessage(sender, senderId, content, isSelf, color, isClaude);
        }

        function handleCatchUp(data) {
            var messages = data.messages || [];
            for (var i = 0; i < messages.length; i++) {
                var msg = messages[i];
                var msgId = msg.id;
                if (msgId && renderedMessageIds.has(msgId)) continue;
                if (msgId) renderedMessageIds.add(msgId);

                var msgType = msg.message_type || 'chat';
                if (msgType === 'join' || msgType === 'leave' || msgType === 'system') {
                    addSystemMessage(msg.content || '');
                } else {
                    var sender = msg.sender_name || msg.sender || 'Unknown';
                    var senderId = msg.sender_id || '';
                    var content = msg.content || '';
                    var isSelf = (senderId === myParticipantId);
                    var color = assignColor(senderId);
                    var pType = participants[senderId] && participants[senderId].participant_type;
            var isClaude = pType === 'claude_proc' || pType === 'cli_chat';
                    addGroupMessage(sender, senderId, content, isSelf, color, isClaude);
                }
            }
        }

        function handleStreamChunk(data) {
            var senderId = data.sender_id || '';
            setStatus('streaming', 'streaming');

            if (!streamBuffers[senderId]) {
                var sender = participants[senderId] ? participants[senderId].name : senderId;
                var color = assignColor(senderId);
                var div = createStreamDiv(sender, color);
                streamBuffers[senderId] = { div: div, text: '' };
            }

            streamBuffers[senderId].text += data.text;
            updateStreamDiv(streamBuffers[senderId].div, streamBuffers[senderId].text);
        }

        function handleStreamEnd(data) {
            var senderId = data.sender_id || '';

            if (streamBuffers[senderId]) {
                finalizeStreamDiv(streamBuffers[senderId].div, streamBuffers[senderId].text);
                delete streamBuffers[senderId];
            }

            // Check if any streams still active
            var activeStreams = Object.keys(streamBuffers).length;
            if (activeStreams === 0) {
                setStatus('connected', 'connected');
            }
        }

        function handleParticipantJoined(participant) {
            if (!participant) return;
            var pid = participant.participant_id || participant.id;
            if (!pid) return;
            // Normalize for internal use
            participant.id = pid;
            participants[pid] = participant;
            assignColor(pid);
            renderParticipants();
            addSystemMessage(participant.name + ' joined the conversation');
        }

        function handleParticipantLeft(participantId) {
            if (!participantId) return;
            var name = participants[participantId] ? participants[participantId].name : participantId;
            delete participants[participantId];
            renderParticipants();
            addSystemMessage(name + ' left the conversation');
        }

        // ── DOM: Messages ──

        function addSystemMessage(text) {
            var messages = document.getElementById('messages');
            var div = document.createElement('div');
            div.className = 'message system-msg';
            div.textContent = text;
            messages.appendChild(div);
            scrollToBottom();
        }

        function addGroupMessage(sender, senderId, content, isSelf, color, isClaude) {
            var messages = document.getElementById('messages');
            var div = document.createElement('div');
            div.className = 'message ' + (isSelf ? 'self' : 'other');

            // Sender name
            var nameEl = document.createElement('div');
            nameEl.className = 'sender-name';
            nameEl.textContent = sender;
            nameEl.style.color = color;
            div.appendChild(nameEl);

            // Content
            var contentEl = document.createElement('div');
            contentEl.className = 'message-content';

            if (isClaude || !isSelf) {
                setSanitizedContent(contentEl, content);
                addCopyButton(div, content);
            } else {
                contentEl.textContent = content;
            }

            div.appendChild(contentEl);
            messages.appendChild(div);
            scrollToBottom();
        }

        function createStreamDiv(senderName, color) {
            var messages = document.getElementById('messages');
            var div = document.createElement('div');
            div.className = 'message other';

            var nameEl = document.createElement('div');
            nameEl.className = 'sender-name';
            nameEl.textContent = senderName;
            nameEl.style.color = color;
            div.appendChild(nameEl);

            var content = document.createElement('div');
            content.className = 'message-content streaming-cursor';
            div.appendChild(content);

            messages.appendChild(div);
            scrollToBottom();
            return div;
        }

        function updateStreamDiv(div, text) {
            var content = div.querySelector('.message-content');
            content.textContent = text;
            scrollToBottom();
        }

        function finalizeStreamDiv(div, rawText) {
            var content = div.querySelector('.message-content');
            content.classList.remove('streaming-cursor');
            setSanitizedContent(content, rawText);
            addCopyButton(div, rawText);
        }

        function addCopyButton(div, rawText) {
            var copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = 'Copy';
            copyBtn.setAttribute('data-raw', rawText);
            copyBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(this.getAttribute('data-raw')).then(function() {
                    copyBtn.textContent = 'Copied';
                    copyBtn.classList.add('copied');
                    setTimeout(function() {
                        copyBtn.textContent = 'Copy';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                });
            });
            div.appendChild(copyBtn);
        }

        function scrollToBottom() {
            var messages = document.getElementById('messages');
            messages.scrollTop = messages.scrollHeight;
        }

        // ── DOM: Participants sidebar ──

        function renderParticipants() {
            var list = document.getElementById('participantList');
            var ids = Object.keys(participants);
            var count = ids.length;

            document.getElementById('participantCount').textContent = count;
            document.getElementById('toggleCount').textContent = count;
            list.textContent = '';

            ids.forEach(function(id) {
                var p = participants[id];
                var color = assignColor(id);
                var initials = getInitials(p.name);

                var el = document.createElement('div');
                el.className = 'participant';
                el.setAttribute('data-id', id);
                el.onclick = function() { selectRecipient(id); };

                var avatar = document.createElement('div');
                avatar.className = 'participant-avatar';
                avatar.style.background = color + '18';
                avatar.style.color = color;
                avatar.style.borderColor = color + '30';
                avatar.textContent = initials;

                var info = document.createElement('div');
                info.className = 'participant-info';

                var name = document.createElement('div');
                name.className = 'participant-name';
                name.textContent = p.name;

                var ptype = p.participant_type || p.type || 'human_ws';
                var typeLabel;
                if (ptype === 'claude_proc') typeLabel = 'claude';
                else if (ptype === 'cli_chat') typeLabel = (p.cli_kind === 'CodexChat') ? 'codex' : (p.cli_kind === 'GeminiChat') ? 'gemini' : 'cli';
                else typeLabel = 'human';
                var type = document.createElement('div');
                type.className = 'participant-type ' + typeLabel;
                type.textContent = typeLabel;

                info.appendChild(name);
                info.appendChild(type);
                el.appendChild(avatar);
                el.appendChild(info);
                list.appendChild(el);
            });

            // Also rebuild mention dropdown
            buildMentionDropdown();
        }

        function getInitials(name) {
            if (!name) return '?';
            var parts = name.trim().split(/\s+/);
            if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
            return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        }

        // ── Mention system ──

        function selectRecipient(id) {
            if (id === null || id === selectedRecipient) {
                selectedRecipient = null;
                document.getElementById('mentionName').textContent = 'all';
            } else {
                selectedRecipient = id;
                var name = participants[id] ? participants[id].name : id;
                document.getElementById('mentionName').textContent = name;
            }
            closeMentionDropdown();
            document.getElementById('input').focus();
        }

        function buildMentionDropdown() {
            var dropdown = document.getElementById('mentionDropdown');
            dropdown.textContent = '';

            // "Everyone" option
            var allOpt = document.createElement('div');
            allOpt.className = 'mention-option';
            allOpt.onclick = function() { selectRecipient(null); };

            var allName = document.createElement('span');
            allName.className = 'mention-opt-name';
            allName.textContent = 'Everyone';

            var allType = document.createElement('span');
            allType.className = 'mention-opt-type';
            allType.textContent = 'broadcast';

            allOpt.appendChild(allName);
            allOpt.appendChild(allType);
            dropdown.appendChild(allOpt);

            // Individual participants
            Object.keys(participants).forEach(function(id) {
                var p = participants[id];
                var opt = document.createElement('div');
                opt.className = 'mention-option';
                opt.onclick = function() { selectRecipient(id); };

                var optName = document.createElement('span');
                optName.className = 'mention-opt-name';
                optName.textContent = p.name;

                var optType = document.createElement('span');
                optType.className = 'mention-opt-type';
                optType.textContent = p.type || 'human';

                opt.appendChild(optName);
                opt.appendChild(optType);
                dropdown.appendChild(opt);
            });
        }

        function toggleMentionDropdown() {
            var dropdown = document.getElementById('mentionDropdown');
            if (dropdown.classList.contains('visible')) {
                closeMentionDropdown();
            } else {
                dropdown.classList.add('visible');
            }
        }

        function closeMentionDropdown() {
            document.getElementById('mentionDropdown').classList.remove('visible');
            mentionDropdownIndex = -1;
        }

        // ── Input handling ──

        function handleKeydown(e) {
            var dropdown = document.getElementById('mentionDropdown');
            var isDropdownOpen = dropdown.classList.contains('visible');

            if (isDropdownOpen) {
                var options = dropdown.querySelectorAll('.mention-option');
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    mentionDropdownIndex = Math.min(mentionDropdownIndex + 1, options.length - 1);
                    highlightMentionOption(options);
                    return;
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    mentionDropdownIndex = Math.max(mentionDropdownIndex - 1, 0);
                    highlightMentionOption(options);
                    return;
                } else if (e.key === 'Enter' && mentionDropdownIndex >= 0) {
                    e.preventDefault();
                    options[mentionDropdownIndex].click();
                    return;
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    closeMentionDropdown();
                    return;
                }
            }

            // Check for @mention trigger
            if (e.key === '@' && document.getElementById('input').value === '') {
                e.preventDefault();
                toggleMentionDropdown();
                return;
            }

            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function highlightMentionOption(options) {
            for (var i = 0; i < options.length; i++) {
                options[i].classList.toggle('selected', i === mentionDropdownIndex);
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        // ── Send message ──

        function sendMessage() {
            var input = document.getElementById('input');
            var text = input.value.trim();
            if (!text) return;

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addSystemMessage('Not connected. Reconnecting...');
                connectWebSocket();
                return;
            }

            var payload = {
                type: 'message',
                text: text
            };

            if (selectedRecipient) {
                payload.recipient = selectedRecipient;
            }

            ws.send(JSON.stringify(payload));

            input.value = '';
            autoResize(input);
            input.focus();
        }

        // ── Add Claude ──

        function promptAddClaude(role) {
            role = role || 'chat';
            var defaultName = role === 'main' ? 'Main Claude' : 'Claude';
            var name = prompt('Enter a name for the new Claude instance:', defaultName);
            if (!name || !name.trim()) return;

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addSystemMessage('Not connected. Cannot add Claude.');
                return;
            }

            ws.send(JSON.stringify({
                type: 'add_claude',
                name: name.trim(),
                role: role
            }));

            var label = role === 'main' ? ' (Main — full context access)' : '';
            addSystemMessage('Requesting new Claude instance: ' + name.trim() + label + '...');
        }

        // ── Add CLI participant (codex / gemini) ──

        function promptAddCli(kind) {
            var defaultName = kind === 'codex' ? 'Codex' : 'Gemini';
            var name = prompt('Enter a name for the new ' + defaultName + ' participant:', defaultName);
            if (!name || !name.trim()) return;

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addSystemMessage('Not connected. Cannot add ' + defaultName + '.');
                return;
            }

            ws.send(JSON.stringify({
                type: kind === 'codex' ? 'add_codex' : 'add_gemini',
                name: name.trim()
            }));

            addSystemMessage('Requesting new ' + defaultName + ' instance: ' + name.trim() + '...');
        }

        // ── Sidebar toggle (mobile) ──

        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('sidebarOverlay');
            var isOpen = sidebar.classList.contains('open');

            if (isOpen) {
                sidebar.classList.remove('open');
                overlay.classList.remove('visible');
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('visible');
            }
        }

        // ── Init ──

        document.addEventListener('DOMContentLoaded', function() {
            // Display conversation ID
            document.getElementById('convIdBadge').textContent = conversationId;

            // Wire up event listeners
            document.getElementById('mentionBtn').addEventListener('click', toggleMentionDropdown);
            document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
            document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);

            // Close mention dropdown on outside click
            document.addEventListener('click', function(e) {
                var dropdown = document.getElementById('mentionDropdown');
                var mentionBtn = document.getElementById('mentionBtn');
                if (!dropdown.contains(e.target) && !mentionBtn.contains(e.target)) {
                    closeMentionDropdown();
                }
            });

            // Connect
            connectWebSocket();
            document.getElementById('input').focus();
        });
    </script>
    <script src="/static/nav.js"></script>
    <script>if (typeof initNav === 'function') initNav('group');</script>
