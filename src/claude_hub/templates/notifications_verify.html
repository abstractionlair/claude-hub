<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - Verification</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 32px;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #f0f6fc;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 24px;
        }
        .error {
            background: #b6252520;
            border: 1px solid #f8514940;
            color: #f85149;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        label {
            font-weight: 500;
            color: #f0f6fc;
        }
        input[type="text"] {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            font-size: 24px;
            color: #f0f6fc;
            text-align: center;
            letter-spacing: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #1f6feb;
            box-shadow: 0 0 0 3px #1f6feb30;
        }
        input[type="text"]::placeholder {
            letter-spacing: 2px;
            color: #484f58;
        }
        button {
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #2ea043;
        }
        button:disabled {
            background: #484f58;
            cursor: not-allowed;
        }
        .remaining {
            color: #8b949e;
            font-size: 14px;
            text-align: center;
        }
        .remaining.warning {
            color: #d29922;
        }
        .remaining.critical {
            color: #f85149;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Alerts</h1>
        <p class="subtitle">Enter your 6-digit authentication code</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/notifications/verify">
            <div>
                <label for="code">Authentication Code</label>
                <input type="text"
                       id="code"
                       name="code"
                       maxlength="6"
                       pattern="[0-9]{6}"
                       placeholder="000000"
                       autocomplete="one-time-code"
                       inputmode="numeric"
                       required
                       autofocus>
            </div>

            <button type="submit">Verify</button>

            {% if remaining_attempts is defined %}
            <p class="remaining {% if remaining_attempts <= 2 %}warning{% endif %}{% if remaining_attempts <= 1 %}critical{% endif %}">
                {{ remaining_attempts }} attempt{% if remaining_attempts != 1 %}s{% endif %} remaining
            </p>
            {% endif %}
        </form>
    </div>

    <script>
        // Auto-submit when 6 digits entered
        document.getElementById('code').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
            if (this.value.length === 6) {
                this.form.submit();
            }
        });
    </script>
</body>
</html>
