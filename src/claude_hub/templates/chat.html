<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Claude Hub Chat</title>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --input-bg: #0f3460;
            --text: #e8e8e8;
            --text-dim: #a0a0a0;
            --accent: #e94560;
            --user-msg: #0f3460;
            --claude-msg: #1a1a2e;
            --border: #30475e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--surface);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
        }

        .status {
            font-size: 12px;
            color: var(--text-dim);
        }

        .status.connected { color: #4caf50; }
        .status.streaming { color: #2196f3; }
        .status.thinking { color: #ff9800; }
        .status.error { color: var(--accent); }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user {
            background: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.claude {
            background: var(--surface);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message.system {
            background: transparent;
            color: var(--text-dim);
            font-size: 13px;
            align-self: center;
            text-align: center;
        }

        .input-area {
            background: var(--surface);
            padding: 12px 16px;
            padding-bottom: 72px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 120px;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--text-dim);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button svg {
            width: 24px;
            height: 24px;
        }

        .thinking {
            display: flex;
            gap: 4px;
            padding: 16px;
        }

        .thinking span {
            width: 8px;
            height: 8px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .thinking span:nth-child(1) { animation-delay: -0.32s; }
        .thinking span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
        }

        .hidden {
            display: none !important;
        }

        /* Markdown rendering in Claude messages */
        .message-content { white-space: normal; }
        .message-content pre { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 6px; overflow-x: auto; }
        .message-content code { background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 3px; font-family: 'Monaco', 'Menlo', monospace; font-size: 0.9em; }
        .message-content pre code { background: none; padding: 0; }
        .message-content p { margin: 0.5em 0; }
        .message-content p:first-child { margin-top: 0; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content ul, .message-content ol { margin: 0.5em 0; padding-left: 1.5em; }
        .message-content h1, .message-content h2, .message-content h3 { margin: 0.5em 0 0.3em; }
        .message-content h1 { font-size: 1.3em; }
        .message-content h2 { font-size: 1.15em; }
        .message-content h3 { font-size: 1.05em; }
        .message-content table { border-collapse: collapse; margin: 0.5em 0; }
        .message-content th, .message-content td { border: 1px solid rgba(255,255,255,0.2); padding: 6px 10px; }
        .message-content blockquote { border-left: 3px solid #e94560; padding-left: 12px; margin: 0.5em 0; opacity: 0.85; }

        /* Copy button on Claude messages */
        .message.claude { position: relative; }
        .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            color: var(--text-dim);
            font-size: 11px;
            padding: 3px 8px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            width: auto;
            height: auto;
        }
        .message.claude:hover .copy-btn,
        .copy-btn:focus { opacity: 1; }
        .copy-btn.copied { color: #4caf50; }

        /* Streaming cursor */
        .streaming-cursor::after {
            content: '';
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Auth handled by nginx basic auth, no token overlay needed -->

    <div class="header">
        <h1>Claude Hub</h1>
        <span class="status" id="status">Connecting...</span>
    </div>

    <div class="messages" id="messages">
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea
                id="input"
                placeholder="Message Claude..."
                rows="1"
                onkeydown="handleKeydown(event)"
                oninput="autoResize(this)"
            ></textarea>
        </div>
        <button id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
        </button>
    </div>

    <script>
        let ws = null;
        let isThinking = false;
        let currentStreamDiv = null;  // The message div being streamed into
        let currentStreamText = '';    // Raw text accumulated during stream
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 10;
        const chatId = 'default';

        function setStatus(text, cls) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = 'status ' + cls;
        }

        // Safely render markdown content (always sanitized via DOMPurify)
        function renderMarkdown(text) {
            if (typeof marked !== 'undefined' && text) {
                var rendered = marked.parse(text);
                if (typeof DOMPurify !== 'undefined') {
                    return DOMPurify.sanitize(rendered);
                }
            }
            return null;  // Caller should fall back to textContent
        }

        function connectWebSocket() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = proto + '//' + location.host + '/ws/chat';

            ws = new WebSocket(url);

            ws.onopen = function() {
                reconnectAttempts = 0;
                setStatus('Connected', 'connected');
                if (document.getElementById('messages').children.length === 0) {
                    addMessage('Connected to Claude', 'system');
                }
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                handleServerEvent(data);
            };

            ws.onclose = function() {
                if (!isThinking) {
                    setStatus('Disconnected', 'error');
                }
                scheduleReconnect();
            };

            ws.onerror = function() {
                setStatus('Connection error', 'error');
            };
        }

        function scheduleReconnect() {
            if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                setStatus('Connection lost', 'error');
                return;
            }
            reconnectAttempts++;
            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000);
            setTimeout(connectWebSocket, delay);
        }

        function handleServerEvent(data) {
            switch (data.type) {
                case 'status':
                    if (data.status === 'thinking') {
                        setStatus('Thinking...', 'thinking');
                    }
                    break;

                case 'text':
                    // First text chunk — replace thinking indicator with stream div
                    if (!currentStreamDiv) {
                        removeThinking();
                        currentStreamDiv = createStreamDiv();
                        setStatus('Streaming...', 'streaming');
                    }
                    currentStreamText += data.text;
                    updateStreamDiv(currentStreamDiv, currentStreamText);
                    break;

                case 'result':
                    removeThinking();
                    if (currentStreamDiv) {
                        // Finalize: render markdown on the accumulated text
                        finalizeStreamDiv(currentStreamDiv, data.text || currentStreamText);
                        currentStreamDiv = null;
                        currentStreamText = '';
                    } else if (data.text) {
                        addMessage(data.text, 'claude');
                    }
                    setStatus('Connected', 'connected');
                    isThinking = false;
                    document.getElementById('sendBtn').disabled = false;
                    document.getElementById('input').focus();
                    break;

                case 'error':
                    removeThinking();
                    if (currentStreamDiv) {
                        finalizeStreamDiv(currentStreamDiv, currentStreamText);
                        currentStreamDiv = null;
                        currentStreamText = '';
                    }
                    addMessage('Error: ' + data.error, 'system');
                    setStatus('Error', 'error');
                    isThinking = false;
                    document.getElementById('sendBtn').disabled = false;
                    break;

                case 'pong':
                    break;
            }
        }

        function createStreamDiv() {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message claude';

            const content = document.createElement('div');
            content.className = 'message-content streaming-cursor';
            div.appendChild(content);

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        function updateStreamDiv(div, text) {
            const content = div.querySelector('.message-content');
            // During streaming, show plain text (fast, no re-parse flicker)
            content.textContent = text;
            const messages = document.getElementById('messages');
            messages.scrollTop = messages.scrollHeight;
        }

        function finalizeStreamDiv(div, rawText) {
            const content = div.querySelector('.message-content');
            content.classList.remove('streaming-cursor');

            // Render sanitized markdown
            var safeHtml = renderMarkdown(rawText);
            if (safeHtml !== null) {
                content.innerHTML = safeHtml;
            } else {
                content.textContent = rawText;
            }

            // Add copy button
            addCopyButton(div, rawText);
        }

        function addCopyButton(div, rawText) {
            var copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = 'Copy';
            copyBtn.setAttribute('data-raw', rawText);
            copyBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(this.getAttribute('data-raw')).then(function() {
                    copyBtn.textContent = 'Copied';
                    copyBtn.classList.add('copied');
                    setTimeout(function() {
                        copyBtn.textContent = 'Copy';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                });
            });
            div.appendChild(copyBtn);
        }

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function addMessage(content, type) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message ' + type;

            if (type === 'claude') {
                var msgContent = document.createElement('div');
                msgContent.className = 'message-content';
                var safeHtml = renderMarkdown(content);
                if (safeHtml !== null) {
                    msgContent.innerHTML = safeHtml;
                } else {
                    msgContent.textContent = content;
                }
                div.appendChild(msgContent);
                addCopyButton(div, content);
            } else {
                div.textContent = content;
            }

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        function showThinking() {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message claude';
            div.id = 'thinking';

            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'thinking';
            for (let i = 0; i < 3; i++) {
                thinkingDiv.appendChild(document.createElement('span'));
            }
            div.appendChild(thinkingDiv);

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        function sendMessage() {
            const input = document.getElementById('input');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message || isThinking) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('Not connected. Reconnecting...', 'system');
                connectWebSocket();
                return;
            }

            addMessage(message, 'user');
            input.value = '';
            autoResize(input);

            isThinking = true;
            sendBtn.disabled = true;
            currentStreamDiv = null;
            currentStreamText = '';
            showThinking();

            ws.send(JSON.stringify({
                type: 'message',
                text: message,
                chat_id: chatId,
            }));
        }

        // Start WebSocket connection
        document.addEventListener('DOMContentLoaded', function() {
            connectWebSocket();
            document.getElementById('input').focus();
        });
    </script>
    <script src="/static/nav.js"></script>
    <script>initNav('chat');</script>
</body>
</html>
