<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtle glow behind center -->
  <circle cx="96" cy="96" r="64" fill="url(#glow)"/>

  <!-- Outer ring of connection nodes -->
  <!-- Top -->
  <line x1="96" y1="96" x2="96" y2="28" stroke="#e94560" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="96" cy="28" r="8" fill="#e94560" opacity="0.7"/>

  <!-- Top-right -->
  <line x1="96" y1="96" x2="144" y2="48" stroke="#e94560" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="144" cy="48" r="8" fill="#e94560" opacity="0.7"/>

  <!-- Right -->
  <line x1="96" y1="96" x2="164" y2="96" stroke="#e94560" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="164" cy="96" r="8" fill="#e94560" opacity="0.7"/>

  <!-- Bottom-right -->
  <line x1="96" y1="96" x2="144" y2="144" stroke="#e94560" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="144" cy="144" r="8" fill="#e94560" opacity="0.7"/>

  <!-- Bottom -->
  <line x1="96" y1="96" x2="96" y2="164" stroke="#e94560" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="96" cy="164" r="8" fill="#e94560" opacity="0.7"/>

  <!-- Bottom-left -->
  <line x1="96" y1="96" x2="48" y2="144" stroke="#e94560" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="48" cy="144" r="8" fill="#e94560" opacity="0.7"/>

  <!-- Left -->
  <line x1="96" y1="96" x2="28" y2="96" stroke="#e94560" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="28" cy="96" r="8" fill="#e94560" opacity="0.7"/>

  <!-- Top-left -->
  <line x1="96" y1="96" x2="48" y2="48" stroke="#e94560" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="48" cy="48" r="8" fill="#e94560" opacity="0.7"/>

  <!-- Central hub node -->
  <circle cx="96" cy="96" r="22" fill="#e94560"/>
  <circle cx="96" cy="96" r="14" fill="#1a1a2e"/>
  <circle cx="96" cy="96" r="7" fill="#e94560"/>
</svg>
