<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtle glow behind center -->
  <circle cx="256" cy="256" r="170" fill="url(#glow)"/>

  <!-- Outer ring of connection nodes -->
  <!-- Top -->
  <line x1="256" y1="256" x2="256" y2="72" stroke="#e94560" stroke-width="6" stroke-opacity="0.5"/>
  <circle cx="256" cy="72" r="20" fill="#e94560" opacity="0.7"/>

  <!-- Top-right -->
  <line x1="256" y1="256" x2="386" y2="126" stroke="#e94560" stroke-width="6" stroke-opacity="0.5"/>
  <circle cx="386" cy="126" r="20" fill="#e94560" opacity="0.7"/>

  <!-- Right -->
  <line x1="256" y1="256" x2="440" y2="256" stroke="#e94560" stroke-width="6" stroke-opacity="0.5"/>
  <circle cx="440" cy="256" r="20" fill="#e94560" opacity="0.7"/>

  <!-- Bottom-right -->
  <line x1="256" y1="256" x2="386" y2="386" stroke="#e94560" stroke-width="6" stroke-opacity="0.5"/>
  <circle cx="386" cy="386" r="20" fill="#e94560" opacity="0.7"/>

  <!-- Bottom -->
  <line x1="256" y1="256" x2="256" y2="440" stroke="#e94560" stroke-width="6" stroke-opacity="0.5"/>
  <circle cx="256" cy="440" r="20" fill="#e94560" opacity="0.7"/>

  <!-- Bottom-left -->
  <line x1="256" y1="256" x2="126" y2="386" stroke="#e94560" stroke-width="6" stroke-opacity="0.5"/>
  <circle cx="126" cy="386" r="20" fill="#e94560" opacity="0.7"/>

  <!-- Left -->
  <line x1="256" y1="256" x2="72" y2="256" stroke="#e94560" stroke-width="6" stroke-opacity="0.5"/>
  <circle cx="72" cy="256" r="20" fill="#e94560" opacity="0.7"/>

  <!-- Top-left -->
  <line x1="256" y1="256" x2="126" y2="126" stroke="#e94560" stroke-width="6" stroke-opacity="0.5"/>
  <circle cx="126" cy="126" r="20" fill="#e94560" opacity="0.7"/>

  <!-- Central hub node -->
  <circle cx="256" cy="256" r="56" fill="#e94560"/>
  <circle cx="256" cy="256" r="36" fill="#1a1a2e"/>
  <circle cx="256" cy="256" r="18" fill="#e94560"/>
</svg>
